<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ApexTrade Live Stream</title>
</head>
<body>
    <h1>ApexTrade Live Binance Data</h1>
    <div id="log" style="font-family: monospace; white-space: pre-wrap;"></div>

    <script>
        const logDiv = document.getElementById('log');
        let socket = new WebSocket("ws://localhost:8080/ws");

        socket.onopen = () => {
            logDiv.innerHTML += "Connected to Go Backend!\n";
            console.log("Connected to Go Backend!");
        };

        socket.onmessage = (event) => {
            // Print to the screen
            logDiv.innerHTML += "Binance: " + event.data + "\n";
            // Also print to the console
            console.log("Received: ", event.data);
        };
    </script>
</body>
</html>
